<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azərlotereya - Yeni Partnyor Portalı</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: { extend: { colors: { brandDarkBlue: '#0a0f24', brandRed: '#ef4444' } } }
        }
    </script>
    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .mobile-frame { max-width: 410px; border: 12px solid #1e293b; border-radius: 40px; }
    </style>
</head>
<body class="bg-[#050714] font-sans text-slate-100 min-h-screen flex items-center justify-center">

    <div class="mobile-frame w-full min-h-screen sm:h-[800px] bg-brandDarkBlue flex flex-col relative overflow-hidden">
        
        <!-- Header -->
        <header class="bg-brandDarkBlue border-b border-slate-800 px-6 py-4 flex justify-between items-center z-20">
            <div class="flex items-center gap-3">
                <div class="w-10 h-10 flex items-center justify-center shrink-0">
                    <img src="logo.png" alt="Azərlotereya Loqo" class="w-full h-full object-contain">
                </div>
                <div>
                    <h1 class="text-base font-extrabold tracking-tight text-white">AZƏRLOTEREYA</h1>
                    <p class="text-[10px] text-slate-400">Yeni Partnyor Portalı</p>
                </div>
            </div>
            <div class="w-2.5 h-2.5 rounded-full bg-emerald-500 animate-pulse"></div>
        </header>

        <!-- Main Content -->
        <main class="flex-1 overflow-y-auto px-5 pt-4 pb-6 no-scrollbar">
            <div class="bg-slate-800 p-6 rounded-2xl border border-slate-700">
                <h2 class="text-lg font-bold mb-2">Salam, Partnyor!</h2>
                <p class="text-slate-400 text-sm">Portalımıza xoş gəlmisiniz. Zəhmət olmasa, tapşırıqları yoxlayın.</p>
            </div>
            
            <div class="mt-6 grid gap-4">
                <div class="bg-slate-900 p-4 rounded-xl border border-slate-800">
                    <i class="fas fa-check-circle text-emerald-500 mb-2"></i>
                    <h3 class="font-semibold">Tapşırıq 1</h3>
                    <p class="text-xs text-slate-500">Məlumatların yenilənməsi</p>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
