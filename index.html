<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Azərlotereya - Yeni Partnyor Portalı</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 text-white p-5">

    <div class="max-w-md mx-auto bg-black p-6 rounded-3xl border border-slate-700 shadow-2xl">
        <header class="flex items-center gap-4 mb-8">
            <div class="w-12 h-12 bg-white rounded-full flex items-center justify-center p-1">
                <img src="logo_only.png" alt="Azərlotereya" class="w-full h-full object-contain">
            </div>
            <div>
                <h1 class="text-xl font-bold">AZƏRLOTEREYA</h1>
                <p class="text-xs text-slate-400">Yeni Partnyor Portalı</p>
            </div>
        </header>

        <h2 class="text-sm font-bold text-slate-500 mb-4 uppercase">Poz-Qazan Məhsulları</h2>
        <div class="space-y-4">
            
            <div class="bg-slate-800 p-3 rounded-xl flex items-center gap-4">
                <img src="qizil.png" alt="Qızıl" class="w-16 h-16 rounded-lg object-cover bg-slate-700">
                <div class="flex flex-col">
                    <span class="font-bold">Qızıl & Yığ, apar!</span>
                    <span class="text-xs text-emerald-400 font-bold">1 AZN</span>
                </div>
            </div>
            
            <div class="bg-slate-800 p-3 rounded-xl flex items-center gap-4">
                <img src="ugurlu7.png" alt="Uğurlu 7" class="w-16 h-16 rounded-lg object-cover bg-slate-700">
                <div class="flex flex-col">
                    <span class="font-bold">Uğurlu 7 & Qoşa</span>
                    <span class="text-xs text-blue-400 font-bold">2 AZN</span>
                </div>
            </div>

        </div>
    </div>

</body>
</html>
